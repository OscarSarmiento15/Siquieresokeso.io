<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¿Entonces aceptas?</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #E4007C; /* Rosa Mexicano */
            font-family: 'Arial Rounded MT Bold', 'Helvetica Rounded', Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            background-color: rgba(255, 255, 255, 0.15);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            max-width: 90%;
            z-index: 10;
        }

        h1 {
            color: #FFFFFF;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .buttons-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            min-height: 100px;
        }

        .btn {
            padding: 15px 35px;
            font-size: 1.5rem;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        #btn-si {
            background-color: #4CAF50; /* Verde */
            color: white;
            transition: transform 0.2s;
        }

        #btn-si:hover {
            transform: scale(1.1);
        }

        #btn-no {
            background-color: #F44336; /* Rojo */
            color: white;
            position: relative; /* Arranca en su flujo natural */
            will-change: left, top;
        }

        .celebration {
            display: none;
            color: #FFFFFF;
            font-size: 2.5rem;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
            animation: pop 0.5s ease-out forwards;
        }

        @keyframes pop {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container" id="main-container">
        <h1 id="question">¿Entonces aceptas?</h1>
        <div class="buttons-container" id="action-box">
            <button class="btn" id="btn-si">Sí</button>
            <button class="btn" id="btn-no">No</button>
        </div>
        <div class="celebration" id="victory-message">
            ¡Sabiiaaa que dirías que sí! ❤️ Enormemente feliz.
        </div>
    </div>

    <script>
        const btnSi = document.getElementById('btn-si');
        const btnNo = document.getElementById('btn-no');
        const question = document.getElementById('question');
        const actionBox = document.getElementById('action-box');
        const victoryMessage = document.getElementById('victory-message');

        let yaDespego = false; 
        let intentosNo = 0; // Variable para contar los clics en "No"
        const FORMSPREE_URL = "https://formspree.io/f/mojolqzk";

        // Función para enviar respuestas por correo usando tu Formspree
        function enviarRespuesta(respuestaX, conteoNo) {
            fetch(FORMSPREE_URL, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "application/json"
                },
                body: JSON.stringify({
                    pregunta: "¿Entonces aceptas?",
                    respuesta: respuestaX,
                    veces_presionado_No: conteoNo // Se envía el dato al correo
                })
            }).catch(err => console.log("Error al procesar el envío: ", err));
        }

        // EFECTO DE MOVIMIENTO DE RECHAZO (HUIDA TIPO IMÁN)
        document.addEventListener('mousemove', (e) => {
            const rect = btnNo.getBoundingClientRect();
            
            const btnX = rect.left + rect.width / 2;
            const btnY = rect.top + rect.height / 2;
            
            const diffX = e.clientX - btnX;
            const diffY = e.clientY - btnY;
            const distancia = Math.sqrt(diffX * diffX + diffY * diffY);
            
            const radioDeteccion = 130; 
            
            if (distancia < radioDeteccion) {
                if (!yaDespego) {
                    btnNo.style.position = 'fixed';
                    btnNo.style.left = `${rect.left}px`;
                    btnNo.style.top = `${rect.top}px`;
                    yaDespego = true;
                    return; 
                }

                const fuerza = (radioDeteccion - distancia) / 1.5;
                const dirX = diffX / distancia;
                const dirY = diffY / distancia;
                
                let nuevoLeft = rect.left - (dirX * fuerza);
                let nuevoTop = rect.top - (dirY * fuerza);
                
                const margen = 25;
                if (nuevoLeft < margen) nuevoLeft = margen;
                if (nuevoLeft > window.innerWidth - rect.width - margen) nuevoLeft = window.innerWidth - rect.width - margen;
                if (nuevoTop < margen) nuevoTop = margen;
                if (nuevoTop > window.innerHeight - rect.height - margen) nuevoTop = window.innerHeight - rect.height - margen;
                
                btnNo.style.left = `${nuevoLeft}px`;
                btnNo.style.top = `${nuevoTop}px`;
            }
        });

        // SI CONSIGUE DARLE CLICK AL NO (ACORRALÁNDOLO CONTRA UN MARGEN)
        btnNo.addEventListener('click', () => {
            intentosNo++; // Suma 1 al contador de rechazos
            enviarRespuesta(`Intentó decir que NO 💔 (Clic número ${intentosNo})`, intentosNo);
            alert("¡Inténtalo de nuevo! 😉");
        });

        // SI DA CLICK EN SÍ
        btnSi.addEventListener('click', () => {
            enviarRespuesta("¡Dijo que SÍ! ❤️", intentosNo); // Envía la confirmación final junto con el total de "No"
            question.style.display = 'none';
            actionBox.style.display = 'none';
            victoryMessage.style.display = 'block';
            btnNo.style.display = 'none'; 
            document.body.style.backgroundColor = '#FF1493'; 
        });

        window.addEventListener('resize', () => {
            if (!yaDespego) {
                btnNo.style.position = 'relative';
                btnNo.style.left = 'auto';
                btnNo.style.top = 'auto';
            }
        });
    </script>
</body>
</html>
